name: Build Desktop Apps

on:
  push:
    tags:
      - "desktop-v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: desktop
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm ci || npm install
      - name: Build macOS DMG
        run: npm run dist:mac
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-dmg
          path: desktop/dist/ExecOps-Digital-Systems-Mac.dmg

  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: desktop
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm ci || npm install
      - name: Build Windows installer
        run: npm run dist:win
      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-setup
          path: desktop/dist/ExecOps-Digital-Systems-Windows-Setup.exe

  release:
    needs: [build-mac, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: mac-dmg
          path: release-assets
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-setup
          path: release-assets
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || format('desktop-v{0}', github.run_number) }}
          name: Desktop Apps ${{ github.ref_type == 'tag' && github.ref_name || format('v{0}', github.run_number) }}
          body: |
            Desktop installers for **Executive Operations Digital Systems**.

            - **macOS:** `ExecOps-Digital-Systems-Mac.dmg`
            - **Windows:** `ExecOps-Digital-Systems-Windows-Setup.exe`

            The app opens the live portal and launches linked systems in your default browser.
          files: |
            release-assets/ExecOps-Digital-Systems-Mac.dmg
            release-assets/ExecOps-Digital-Systems-Windows-Setup.exe
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
